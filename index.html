<!DOCTYPE html>
<html>
<head>
  <title>Sorry Anam ❤️</title>

  <!-- Mobile Fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 90%;
      width: 350px;
      animation: fadeIn 1.5s ease;
      z-index: 1;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1e4d;
      transform: scale(1.05);
    }

    /* Fade animation */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Anam, I am really sorry 😔</h2>
  <p>Mujhse galti ho gayi... I didn’t mean to hurt you.</p>
  <p>Can we fix this? ❤️</p>

  <button onclick="showLove()">Click here</button>

  <p id="msg"></p>
</div>

<script>
function showLove() {
  const text = "I really care about you... please gussa mat raho ❤️";
  let i = 0;
  document.getElementById("msg").innerHTML = "";

  let interval = setInterval(() => {
    document.getElementById("msg").innerHTML += text.charAt(i);
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 50);
}

/* Create floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}
